# Codecov configuration
# See: https://docs.codecov.com/docs/codecov-yaml

codecov:
  notify:
    # Coverage arrives as 2 uploads: the `coverage` job's single merged Dart
    # lcov (all 4 file-shards unioned by scripts/merge_lcov.py) plus the
    # script-tests job (flag `scripts`). We merge the shards ourselves rather
    # than let Codecov merge per-shard flag uploads -- that cross-flag merge
    # let all-zero "compiled-but-not-executed" reports override a file's real
    # coverage (a file one shard executes is compiled as 0 by every other shard
    # that only imports it), zeroing genuinely-tested code. Hold the status
    # until both uploads arrive so it is computed once on the complete picture.
    after_n_builds: 2
    wait_for_ci: true

comment:
  # Same rationale: don't post/update the PR comment until both uploads are in.
  after_n_builds: 2

coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 5%
    patch:
      default:
        target: 80%

ignore:
  - "**/*.g.dart"
  - "**/*.freezed.dart"
  - "lib/l10n/**"
  - "test/**"
  - "integration_test/**"
